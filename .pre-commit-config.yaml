repos:
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ["--line-length", "88"]

  - repo: https://github.com/psf/black
    rev: 24.8.0
    hooks:
      - id: black

  - repo: https://github.com/pycqa/flake8
    rev: 7.1.2
    hooks:
      - id: flake8
        files: ^(src|specs)/

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.1
    hooks:
      - id: mypy
        files: ^src/
        pass_filenames: false
        args: ["src/"]

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: ./scripts/test.sh
        language: script
        stages: [pre-push]
        pass_filenames: false
        always_run: true
